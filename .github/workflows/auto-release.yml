name: Auto Version and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.9"
  NODE_VERSION: "22"

jobs:
  version-and-tag:
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'release:')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Determine Version
        id: version
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const msg = process.env.COMMIT_MESSAGE || '';
          const match = msg.match(/release:\s*([0-9]+\.[0-9]+\.[0-9]+|patch|minor|major)/i);
          const bump = match ? match[1].toLowerCase() : 'patch';
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const parts = pkg.version.split('.').map(Number);
          if (parts.length !== 3 || parts.some(Number.isNaN)) {
            throw new Error(`package.json version is not semver: ${pkg.version}`);
          }
          let version = bump;
          if (bump === 'patch') version = `${parts[0]}.${parts[1]}.${parts[2] + 1}`;
          if (bump === 'minor') version = `${parts[0]}.${parts[1] + 1}.0`;
          if (bump === 'major') version = `${parts[0] + 1}.0.0`;
          console.log(`version=${version}`);
          EOF
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      - name: Update app versions
        run: |
          node <<'EOF'
          const fs = require('fs');
          const version = process.env.NEW_VERSION;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          packageJson.version = version;
          fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, 2)}\n`);

          const tauriConfig = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          tauriConfig.version = version;
          fs.writeFileSync('src-tauri/tauri.conf.json', `${JSON.stringify(tauriConfig, null, 2)}\n`);

          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8')
            .replace(/^version = ".*"$/m, `version = "${version}"`);
          fs.writeFileSync('src-tauri/Cargo.toml', cargoToml);
          EOF
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}

      - name: Validate release version
        run: cargo check
        working-directory: src-tauri
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"

      - name: Commit and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          
          # Only commit if there are changes
          if [[ -n $(git status -s) ]]; then
            git add package.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
            git commit -m "chore: release v${{ steps.version.outputs.version }}"
            git push origin main
          fi
          
          # Create and push the tag which triggers the build-installers workflow
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
