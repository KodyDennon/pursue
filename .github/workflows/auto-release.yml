name: Auto Version and Release

on:
  push:
    branches:
      - main

jobs:
  version-and-tag:
    name: Bump Version and Tag
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'release:')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine Version
        id: version
        run: |
          # Extract version from commit message, e.g., "release: 0.1.1" or "release: patch"
          MSG="${{ github.event.head_commit.message }}"
          # Regex to find semver or keywords
          BUMP=$(echo "$MSG" | grep -ioP 'release:\s*\K([0-9]+\.[0-9]+\.[0-9]+|patch|minor|major)' || echo "patch")
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

      - name: Bump package.json version
        run: |
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Bump Cargo.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ env.NEW_VERSION }}\"/" src-tauri/Cargo.toml

      - name: Commit and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only commit if there are changes
          if [[ -n $(git status -s) ]]; then
            git commit -am "chore: release v${{ env.NEW_VERSION }}"
            git push origin main
          fi
          
          # Create and push the tag which triggers the build-installers workflow
          git tag "v${{ env.NEW_VERSION }}"
          git push origin "v${{ env.NEW_VERSION }}"
