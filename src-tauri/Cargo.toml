[package]
name = "pursue-data-analyzer"
version = "0.1.0"
description = "Local-first PURSUE/WAR.gov OSINT evidence analyzer"
authors = ["PURSUE Data Analyzer contributors"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "pursue_data_analyzer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8.6", features = ["sqlite", "runtime-tokio-native-tls", "macros"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
csv = "1.3"
tauri-plugin-sql = "2.2.1"
tauri-plugin-fs = "2.2.0"
tauri-plugin-shell = "2.2.0"
tauri-plugin-log = "2.2.0"
uuid = { version = "1.23.1", features = ["v4"] }
sha2 = "0.10.9"
hex = "0.4.3"
futures-util = "0.3.32"
lopdf = "0.40.0"
regex = "1.12.2"
url = "2.5.8"
